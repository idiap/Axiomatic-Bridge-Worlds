# Minimal public preset for smoke tests and lightweight demos.
#
# Purpose:
#   This is the fastest way to generate a small, deterministic ABW corpus that
#   still covers every disclosed paper-core family.
#
# Motivation:
#   The full benchmark is great for realism, but it is overkill when the real
#   question is "does generation, packaging, scoring, or session tooling still
#   work after this change?"
#
# Typical use:
#   python scripts/generate_dataset.py --config configs/mvp.yaml
#
# Conceptual note:
#   Each family receives one development and one public-test example. Each
#   world packages both formal and natural-language public views.
#
# Limitations:
#   Results on this preset should never be treated as aggregate ABW claims. It
#   is a 14-world smoke set for executable checks, not a benchmark-scale sample.

dataset_name: axiomatic_bridge_worlds_mvp
version: 0.2.0
dsl_version: abw-dsl-v2
output_dir: datasets/mvp

views:
  - formal
  - natural_language

families:
  - predicate_invention
  - lemma_invention
  - analogy
  - invariant
  - quotient
  - normal_form
  - multi_step

splits:
  dev:
    examples_per_family: 1
  test_public:
    examples_per_family: 1

# These controls keep the proof search bounded and reproducible.
start_seed: 100
max_term_depth: 3
proof_budget: 3
hidden_steps:
  - 2
  - 3
include_distractors: true

# Even the smoke worlds carry interactive-session defaults so session tooling can
# be exercised against the same packaged artifacts as the larger presets.
interactive:
  enabled: true
  query_budget: 20
  countermodels: true

# The default backend remains the local bounded prover.
prover_backend:
  name: local
  command: []

# Paper-core disclosure preset.
#
# This profile intentionally contains only the seven ABW families described in
# the paper's benchmark-family table. It is the release-facing reproduction
# profile: five development worlds and fifty public-test worlds per family.

dataset_name: axiomatic_bridge_worlds_paper_core
version: 0.3.0
dsl_version: abw-dsl-v2
output_dir: datasets/paper_core

views:
  - formal
  - natural_language

families:
  - predicate_invention
  - lemma_invention
  - analogy
  - invariant
  - quotient
  - normal_form
  - multi_step

# Counts are expressed per family so the dataset remains balanced. The dev
# split mirrors the 5-per-family model-selection slice, while test_public
# mirrors the 50-per-family paper-core evaluation slice.
splits:
  dev:
    examples_per_family: 5
    start_seed: 4100
  test_public:
    examples_per_family: 50
    start_seed: 3114

start_seed: 3100
max_term_depth: 4
proof_budget: 4
hidden_steps:
  - 2
  - 3
  - 4
include_distractors: true

interactive:
  enabled: true
  query_budget: 20
  countermodels: true

prover_backend:
  name: local
  command: []
